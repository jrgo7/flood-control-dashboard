<section class="regional-stats-panel">
  <div class="header-row">
    <h2>Regional Statistics</h2>
    
    <div class="controls">
      <div class="dropdown-container">
        <div class="dropdown_label" id="regionDropdownLabel">
          Select Region
        </div>

        <ul class="dropdown" id="regionDropdown">
          <li class="dropdown_item" value="clear"><i>Clear</i></li>
          <li class="dropdown_item has-checkbox">
            <label class="custom-checkbox">
              <input type="checkbox">
              <span class="checkmark"></span>
              <span class="label-text">All Regions</span>
            </label>
          </li>
        </ul>
      </div> 

      <div class="dropdown-container">
        <div class="dropdown_label" id="sortDropdownLabel">
          Sort by
        </div>

        <ul class="dropdown" id="sortDropdown">
          <li class="dropdown_item" value="default"><i>Default</i></li>
          <li class="dropdown_item" value="alpha">Alphabetical</li>
          <li class="dropdown_item" value="highest">Highest Budget</li>
          <li class="dropdown_item" value="lowest">Lowest Budget</li>
        </ul>
      </div>

      <!-- View Toggle -->
      <div class="toggle-group" id="viewToggle">
        <button data-view="both" class="active">Both</button>
        <button data-view="budget">Budget</button>
        <button data-view="count">Projects</button>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-grid">
    <div class="chart-card" id="budgetContainer">
      <h3>Budget Allocation</h3>
      <canvas id="budgetChart"></canvas>
    </div>

    <div class="chart-card" id="countContainer">
      <h3>Project Count</h3>
      <canvas id="countChart"></canvas>
    </div>
  </div>
</section>
